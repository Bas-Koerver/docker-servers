services:
  sonarr:
    image: ghcr.io/hotio/sonarr:release-4.0.19.2979
    restart: unless-stopped
    container_name: sonarr
    hostname: sonarr.internal

    labels:
      traefik.enable: true
      traefik.http.routers.sonarr.rule: Host(`sonarr.xn--krver-jua.it`)
      traefik.http.routers.sonarr.entrypoints: websecure
      traefik.http.routers.sonarr.tls: true
      traefik.http.routers.sonarr.middlewares: error-pages-middleware
      traefik.http.routers.sonarr.service: sonarr
      traefik.http.services.sonarr.loadBalancer.server.port: 8989

    environment:
      PUID: 1104
      PGID: 1001
      UMASK: 002
      TZ: Europe/Amsterdam

    volumes:
      - type: bind
        source: ${APPDATA_LOCATION:?No appdata directory configured}/sonarr
        target: /config
      - type: bind
        source: ${DATA_LOCATION:?No data directory configured}
        target: /data
        bind:
          create_host_path: true
