services:
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:release-5.2.1
    restart: unless-stopped
    container_name: qbittorrent
    hostname: qbittorrent.internal
    labels:
      traefik.enable: true
      traefik.http.routers.qbittorrent.rule: Host(`qbittorrent.xn--krver-jua.it`)
      traefik.http.routers.qbittorrent.entrypoints: websecure
      traefik.http.routers.qbittorrent.tls: true
      # traefik.http.routers.qbittorrent.tls.certresolver: cf-dns-resolver
      traefik.http.routers.qbittorrent.middlewares: error-pages-middleware
    environment:
      - PUID=1109
      - PGID=1001
      - UMASK=002
      - TZ=Europe/Amsterdam

      - VPN_ENABLED=true
      - VPN_CONF=wg0-proton
      - VPN_PROVIDER=proton 
      - VPN_LAN_NETWORK=10.0.0.1/16 
      - VPN_LAN_LEAK_ENABLED=false 
      # - VPN_EXPOSE_PORTS_ON_LAN 
      - VPN_AUTO_PORT_FORWARD=true 
      # - VPN_PORT_REDIRECTS 
      - VPN_HEALTHCHECK_ENABLED=false 
      # - VPN_NAMESERVERS 
      # - VPN_INTERFACE_PREFIXES 
      - PRIVOXY_ENABLED=false 
      - UNBOUND_ENABLED=false 
      # - UNBOUND_NAMESERVERS 
    volumes:
      - type: bind
        source: ${APPDATA_LOCATION:?No appdata directory configured}/qbittorrent
        target: /config
      - type: bind
        source: ${DATA_LOCATION:?No data directory configured}/torrents
        target: /data/torrents
        bind:
          create_host_path: true
    ports:
      - name: web-ui
        target: 8080
        published: 8080
        protocol: tcp
        app_protocol: http
        mode: host
    cap_add:
      - NET_ADMIN