services:
  jellyfin:
    image: ghcr.io/hotio/jellyfin:release-10.11.10
    restart: unless-stopped
    container_name: jellyfin
    hostname: jellyfin.internal 
    labels:
      traefik.enable: true
      traefik.http.routers.jellyfin.rule: Host(`jellyfin.xn--krver-jua.it`)
      traefik.http.routers.jellyfin.entrypoints: websecure
      traefik.http.routers.jellyfin.tls: true
      # traefik.http.routers.jellyfin.tls.certresolver: cf-dns-resolver
      traefik.http.routers.jellyfin.middlewares: error-pages-middleware
      traefik.http.services.jellyfin.loadbalancer.server.port: 8096
    environment:
      - PUID=1101
      - PGID=1001
      - UMASK=002
      - TZ=Europe/Amsterdam
    volumes:
      - type: bind
        source: ${APPDATA_LOCATION:?No appdata directory configured}/jellyfin
        target: /config
      - type: bind
        source: ${DATA_LOCATION:?No data directory configured}/media
        target: /data/media
        bind:
          create_host_path: true
    ports:
      - name: web-ui
        target: 8096
        published: 8096
        protocol: tcp
        app_protocol: http
        mode: host